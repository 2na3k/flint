services:
  ray-head:
    image: rayproject/ray:2.54.0-py312
    command:
      - bash
      - -c
      - |
        pip install duckdb pyarrow pandas fsspec psutil --quiet --no-cache-dir &&
        ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 \
          --metrics-export-port=8080 --block
    ports:
      - "16379:6379"   # Ray GCS (remapped — 6379 used by other services)
      - "8265:8265"    # Ray dashboard
      - "10001:10001"  # Ray client (driver connects here)
      - "8080:8080"    # Ray metrics (Prometheus scrape)
    volumes:
      - .:/workspace/flint          # flint source (importable on all nodes)
      - ./data:/data                # shared dataset directory
      - ./observability/ray-tmp:/tmp/ray  # shared Ray runtime dir (metrics, service discovery)
    environment:
      PYTHONPATH: /workspace/flint
    shm_size: "2g"
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  ray-worker:
    image: rayproject/ray:2.54.0-py312
    command:
      - bash
      - -c
      - |
        pip install duckdb pyarrow pandas fsspec psutil --quiet --no-cache-dir &&
        ray start --address=ray-head:6379 --metrics-export-port=8080 --block
    depends_on:
      ray-head:
        condition: service_healthy
    volumes:
      - .:/workspace/flint
      - ./data:/data
    environment:
      PYTHONPATH: /workspace/flint
    shm_size: "2g"
    deploy:
      replicas: 3

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/tmp/ray/session_latest/metrics/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/ray-tmp:/tmp/ray:ro  # Ray's prometheus.yml + service discovery JSON
      - prometheus-data:/prometheus
    ports:
      - "19090:9090"   # 9090 taken by other services; access via http://localhost:19090
    depends_on:
      ray-head:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    volumes:
      - ./observability/ray-tmp:/tmp/ray:ro  # Ray's generated dashboard JSONs
      - ./observability/grafana/provisioning:/etc/grafana/provisioning  # our datasource + dashboard providers
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "3001:3000"    # 3000 may be taken; access via http://localhost:3001
    depends_on:
      - prometheus

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: "flint-local-cluster-01"
    ports:
      - "9094:9094"   # EXTERNAL — host connects via localhost:9094
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"   # http://localhost:8090
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  prometheus-data:   # Prometheus TSDB
  grafana-data:      # Grafana state (dashboard preferences, etc.)
